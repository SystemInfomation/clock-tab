# Google Cloud Run Service Configuration for Discord Bot
# This is a long-running service, so we configure it to:
# - Always allocate CPU (no scale-to-zero)
# - Minimum instances = 1 (always running)
# - High timeout (or unlimited)

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: discord-moderation-bot
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        # Always allocate CPU (required for long-running bot)
        run.googleapis.com/cpu-throttling: "false"
        # Set high timeout (300s = 5 minutes, max for Cloud Run)
        run.googleapis.com/timeout: "300s"
        # Minimum instances = 1 (prevents scale-to-zero, bot must stay connected)
        autoscaling.knative.dev/minScale: "1"
        # Maximum instances (adjust based on needs)
        autoscaling.knative.dev/maxScale: "1"
    spec:
      containerConcurrency: 1
      containers:
      - image: gcr.io/PROJECT_ID/discord-moderation-bot:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        # Environment variables (set via Cloud Run secrets or environment variables)
        # These should be set via: gcloud run services update discord-moderation-bot --update-env-vars KEY=VALUE
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: discord-token
              key: latest
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-uri
              key: latest
        - name: GUILD_ID
          valueFrom:
            secretKeyRef:
              name: guild-id
              key: latest
        - name: STAFF_CHANNEL_ID
          value: "1444413105496129657"
        - name: LOG_CHANNEL_ID
          valueFrom:
            secretKeyRef:
              name: log-channel-id
              key: latest
        - name: BOT_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: bot-client-id
              key: latest
        - name: AUTO_BAN_THRESHOLD
          value: "10"
        - name: WARN_POINTS
          value: "1"
        - name: MUTE_POINTS
          value: "3"
        - name: KICK_POINTS
          value: "5"
        - name: BAN_POINTS
          value: "9"
        - name: WS_PORT
          value: "3001"
        resources:
          limits:
            cpu: "1"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          timeoutSeconds: 3
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 3
          periodSeconds: 30
          failureThreshold: 3

