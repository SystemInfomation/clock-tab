# Google Cloud Run Service Configuration for Next.js Dashboard
# This is a stateless HTTP service, perfect for Cloud Run

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: moderation-dashboard
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        # Allow scale-to-zero (cost optimization for stateless service)
        autoscaling.knative.dev/minScale: "0"
        # Maximum instances (adjust based on traffic)
        autoscaling.knative.dev/maxScale: "10"
        # Standard timeout for HTTP requests
        run.googleapis.com/timeout: "60s"
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/PROJECT_ID/moderation-dashboard:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        # Environment variables (set via Cloud Run secrets or environment variables)
        - name: NEXTAUTH_URL
          value: "https://YOUR-DASHBOARD-URL.run.app"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: nextauth-secret
              key: latest
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: discord-client-id
              key: latest
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: discord-client-secret
              key: latest
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-uri
              key: latest
        - name: GUILD_ID
          valueFrom:
            secretKeyRef:
              name: guild-id
              key: latest
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
        startupProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          timeoutSeconds: 3
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 3
          periodSeconds: 30
          failureThreshold: 3

